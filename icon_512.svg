<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0.1" y2="1">
    <stop offset="0%" stop-color="#0e1016"/>
    <stop offset="100%" stop-color="#060709"/>
  </linearGradient>
  <linearGradient id="rod" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#6b5412"/>
    <stop offset="50%" stop-color="#9a7a1e"/>
    <stop offset="100%" stop-color="#6b5412"/>
  </linearGradient>
  <linearGradient id="plate" x1="0" y1="0" x2="0.2" y2="1">
